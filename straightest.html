<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Straightest Line</title>
<style>
  :root { --bg:#0e1116; --card:#1a1f27; --accent:#4cc2ff; --good:#37d67a;
          --warn:#f5a623; --bad:#ff5c5c; --text:#e6edf3; --muted:#8b98a5; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
         background:var(--bg); color:var(--text); padding:16px; }
  h1 { font-size:20px; margin:4px 0 14px; text-align:center; }
  .card { background:var(--card); border-radius:14px; padding:16px; margin-bottom:14px; }
  input { width:100%; padding:14px; font-size:18px; border-radius:10px;
          border:1px solid #2b333d; background:#0e1116; color:var(--text); }
  button { width:100%; padding:20px; font-size:22px; font-weight:700;
           border:none; border-radius:14px; color:#08131b; margin-top:12px; }
  #startBtn { background:var(--good); }
  #stopBtn  { background:var(--bad); color:#fff; }
  button:disabled { opacity:.35; }
  .stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .stat { background:#0e1116; border-radius:10px; padding:12px; text-align:center; }
  .stat .n { font-size:26px; font-weight:700; }
  .stat .l { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  #acc { font-weight:700; }
  .result { text-align:center; padding:10px 0; }
  .result .big { font-size:44px; font-weight:800; color:var(--accent); }
  .result .sub { color:var(--muted); font-size:14px; }
  table { width:100%; border-collapse:collapse; }
  th,td { padding:8px 6px; text-align:left; font-size:15px; border-bottom:1px solid #232b34; }
  th { color:var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; }
  td.score { font-weight:700; color:var(--accent); text-align:right; }
  tr.win td { color:var(--good); }
  .row { display:flex; gap:10px; }
  .row button { margin-top:0; }
  .small { padding:12px; font-size:15px; background:#2b333d; color:var(--text); }
  .hint { color:var(--muted); font-size:13px; text-align:center; margin-top:8px; line-height:1.4; }
</style>
</head>
<body>
<h1>🛶 Straightest Line — 1&nbsp;km</h1>

<div class="card">
  <input id="name" placeholder="Paddler name" autocomplete="off">
  <button id="startBtn">▶ Start</button>
  <button id="stopBtn" disabled>■ Stop & Score</button>
</div>

<div class="card" id="live" style="display:none">
  <div class="stats">
    <div class="stat"><div class="n" id="dist">0</div><div class="l">meters paddled</div></div>
    <div class="stat"><div class="n" id="time">0:00</div><div class="l">elapsed</div></div>
    <div class="stat"><div class="n" id="pts">0</div><div class="l">gps points</div></div>
    <div class="stat"><div class="n"><span id="acc">–</span></div><div class="l">gps accuracy</div></div>
  </div>
  <div class="hint" id="accHint"></div>
</div>

<div class="card" id="resultCard" style="display:none">
  <div class="result">
    <div class="big" id="scoreBig">–</div>
    <div class="sub">average meters off your best-fit straight line — lower is better</div>
    <div class="sub" id="scoreDetail" style="margin-top:8px"></div>
  </div>
</div>

<div class="card">
  <label for="gpxFile" style="display:block;font-size:15px;margin-bottom:8px">
    📂 Score GPX file(s) — export from Strava/any app, pick them here:</label>
  <input id="gpxFile" type="file" accept=".gpx,application/gpx+xml" multiple>
  <div class="hint" id="gpxMsg" style="margin-top:6px"></div>
</div>

<div class="card">
  <table>
    <thead><tr><th>#</th><th>Paddler</th><th style="text-align:right">Avg off</th></tr></thead>
    <tbody id="board"></tbody>
  </table>
  <div class="row" style="margin-top:12px">
    <button class="small" id="clearBtn">Clear leaderboard</button>
  </div>
</div>

<div class="hint">Put the phone flat on the deck, screen up, clear view of sky.<br>
Keep this page open while paddling (don't lock the screen).</div>

<script>
const $ = id => document.getElementById(id);
let watchId=null, pts=[], startTime=0, timer=null;

function haversine(a,b){
  const R=6371000, toR=x=>x*Math.PI/180;
  const dLat=toR(b.lat-a.lat), dLon=toR(b.lon-a.lon);
  const s=Math.sin(dLat/2)**2 + Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}
function pathLength(p){ let d=0; for(let i=1;i<p.length;i++) d+=haversine(p[i-1],p[i]); return d; }

// project to local meters around the mean point
function toMeters(p){
  const lat0=p.reduce((s,x)=>s+x.lat,0)/p.length;
  const lon0=p.reduce((s,x)=>s+x.lon,0)/p.length;
  const mLat=111320, mLon=111320*Math.cos(lat0*Math.PI/180);
  return p.map(x=>({x:(x.lon-lon0)*mLon, y:(x.lat-lat0)*mLat}));
}
function dist2(a,b){ return Math.hypot(a.x-b.x,a.y-b.y); }

// drop stationary jitter at start & end
function trimEnds(xy, thr){
  if(xy.length<3) return xy;
  let i=0; while(i<xy.length-1 && dist2(xy[i],xy[0])<thr) i++;
  let j=xy.length-1; while(j>0 && dist2(xy[j],xy[xy.length-1])<thr) j--;
  const t=xy.slice(i,j+1);
  return t.length>=2 ? t : xy;
}

// total-least-squares (principal axis) best-fit line -> avg perpendicular dist
function score(xy){
  const n=xy.length;
  const cx=xy.reduce((s,p)=>s+p.x,0)/n, cy=xy.reduce((s,p)=>s+p.y,0)/n;
  let sxx=0,syy=0,sxy=0;
  for(const p of xy){ const dx=p.x-cx, dy=p.y-cy; sxx+=dx*dx; syy+=dy*dy; sxy+=dx*dy; }
  const th=0.5*Math.atan2(2*sxy, sxx-syy);
  const dx=Math.cos(th), dy=Math.sin(th);
  let sum=0,sq=0,mx=0;
  for(const p of xy){
    const perp=Math.abs((p.x-cx)*(-dy)+(p.y-cy)*dx);
    sum+=perp; sq+=perp*perp; if(perp>mx) mx=perp;
  }
  return { avg:sum/n, rms:Math.sqrt(sq/n), max:mx };
}

function fmtTime(ms){ const s=Math.floor(ms/1000); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }

function start(){
  if(!navigator.geolocation){ alert('No GPS available in this browser.'); return; }
  pts=[]; startTime=Date.now();
  $('live').style.display='block'; $('resultCard').style.display='none';
  $('startBtn').disabled=true; $('stopBtn').disabled=false; $('name').disabled=true;
  timer=setInterval(()=>$('time').textContent=fmtTime(Date.now()-startTime),500);
  watchId=navigator.geolocation.watchPosition(pos=>{
    const c=pos.coords;
    pts.push({lat:c.latitude, lon:c.longitude, acc:c.accuracy});
    $('pts').textContent=pts.length;
    $('dist').textContent=Math.round(pathLength(pts));
    const a=$('acc'); a.textContent=Math.round(c.accuracy)+'m';
    a.style.color = c.accuracy<10 ? 'var(--good)' : c.accuracy<25 ? 'var(--warn)' : 'var(--bad)';
    $('accHint').textContent = c.accuracy>25 ? 'Weak signal — wait for a clearer sky view before racing.' : '';
  }, err=>alert('GPS error: '+err.message),
  { enableHighAccuracy:true, maximumAge:0, timeout:10000 });
}

function stop(){
  navigator.geolocation.clearWatch(watchId); clearInterval(timer);
  $('startBtn').disabled=false; $('stopBtn').disabled=true; $('name').disabled=false;
  if(pts.length<5){ alert('Not enough GPS points recorded.'); return; }
  const xy=trimEnds(toMeters(pts), 8);
  const s=score(xy);
  const len=pathLength(pts);
  $('resultCard').style.display='block';
  $('scoreBig').textContent=s.avg.toFixed(2)+' m';
  $('scoreDetail').innerHTML=
     `rms ${s.rms.toFixed(2)} m · worst ${s.max.toFixed(2)} m · length ${Math.round(len)} m`;
  const name=($('name').value||'Paddler '+(load().length+1)).trim();
  save({name, avg:s.avg, rms:s.rms, max:s.max, len});
  render();
}

// leaderboard persistence
function load(){ try{ return JSON.parse(localStorage.getItem('board')||'[]'); }catch(e){ return []; } }
function save(r){ const b=load(); b.push(r); localStorage.setItem('board',JSON.stringify(b)); }
function render(){
  const b=load().sort((a,c)=>a.avg-c.avg);
  $('board').innerHTML = b.map((r,i)=>
    `<tr class="${i===0?'win':''}"><td>${i+1}</td><td>${r.name}</td>`+
    `<td class="score">${r.avg.toFixed(2)} m</td></tr>`).join('')
    || '<tr><td colspan="3" style="color:var(--muted)">No runs yet</td></tr>';
}

// --- score a GPX file (no recording needed) --------------------------------
function parseGpx(text){
  const doc=new DOMParser().parseFromString(text,'application/xml');
  const nodes=doc.getElementsByTagName('trkpt');
  const p=[];
  for(const n of nodes){
    const lat=parseFloat(n.getAttribute('lat')), lon=parseFloat(n.getAttribute('lon'));
    if(!isNaN(lat)&&!isNaN(lon)) p.push({lat,lon});
  }
  return p;
}
function scoreGpxPoints(p, name){
  if(p.length<5){ return `${name}: too few points`; }
  const xy=trimEnds(toMeters(p),8);
  const s=score(xy), len=pathLength(p);
  save({name, avg:s.avg, rms:s.rms, max:s.max, len});
  return `${name}: ${s.avg.toFixed(2)} m off (length ${Math.round(len)} m)`;
}
$('gpxFile').onchange=async e=>{
  const files=[...e.target.files]; const msgs=[];
  for(const f of files){
    try{
      const text=await f.text();
      const name=f.name.replace(/\.gpx$/i,'');
      msgs.push(scoreGpxPoints(parseGpx(text), name));
    }catch(err){ msgs.push(`${f.name}: error (${err.message})`); }
  }
  $('gpxMsg').innerHTML=msgs.join('<br>');
  render();
  e.target.value='';
};

$('startBtn').onclick=start;
$('stopBtn').onclick=stop;
$('clearBtn').onclick=()=>{ if(confirm('Clear the whole leaderboard?')){ localStorage.removeItem('board'); render(); } };
render();
</script>
</body>
</html>
